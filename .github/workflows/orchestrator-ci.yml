name: orchestrator-ci

on:
  pull_request:
    paths:
      - 'orchestrator/**'
      - '.github/workflows/orchestrator-ci.yml'
  push:
    branches: [main]
    tags:
      - 'orchestrator-v*'
    paths:
      - 'orchestrator/**'
      - '.github/workflows/orchestrator-ci.yml'

defaults:
  run:
    working-directory: orchestrator

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sisyphus-orchestrator

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.5.4'

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv venv && uv pip install -e ".[dev]"

      - name: ruff
        run: uv run ruff check src/ tests/

      - name: pytest
        run: uv run pytest -v --tb=short -m "not integration"

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.3'

      - name: helm lint (defaults)
        # 默认 values 缺 secret.bkd_token 会 fail-by-design，是预期行为
        run: |
          set +e
          helm lint helm/ 2>&1 | tee /tmp/lint.txt
          grep -q 'values.secret.bkd_token is required' /tmp/lint.txt || exit 1

      - name: helm lint (with dev values)
        run: helm lint helm/ -f helm/values.dev.yaml

      - name: helm template (rendered yaml sanity)
        run: helm template orch helm/ -f helm/values.dev.yaml > /dev/null

  docker-build:
    # PR 上只 build 不 push；push 到 main / tag 走下面的 image-publish 推 GHCR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: orchestrator
          push: false
          tags: sisyphus-orchestrator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  image-publish:
    # 只在 push 到 main / tag 跑；PR 不推
    if: github.event_name == 'push'
    needs: [lint-test, helm-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    # GHCR 推送权限
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main 分支 → :main + :sha-<short>
            type=ref,event=branch
            type=sha,prefix=sha-
            # tag orchestrator-v1.2.3 → :1.2.3 + :1.2 + :1 + :latest
            type=match,pattern=orchestrator-v(.*),group=1
            type=match,pattern=orchestrator-v(\d+\.\d+),group=1
            type=match,pattern=orchestrator-v(\d+),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/orchestrator-v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: orchestrator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
