name: orchestrator-ci

on:
  pull_request:
    paths:
      - 'orchestrator/**'
      - '.github/workflows/orchestrator-ci.yml'
  push:
    branches: [main]
    paths:
      - 'orchestrator/**'
      - '.github/workflows/orchestrator-ci.yml'

defaults:
  run:
    working-directory: orchestrator

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.5.4'

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv venv && uv pip install -e ".[dev]"

      - name: ruff
        run: uv run ruff check src/ tests/

      - name: pytest
        run: uv run pytest -v --tb=short

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.3'

      - name: helm lint (defaults)
        # 默认 values 缺 secret.bkd_token 会 fail-by-design，是预期行为
        run: |
          set +e
          helm lint helm/ 2>&1 | tee /tmp/lint.txt
          grep -q 'values.secret.bkd_token is required' /tmp/lint.txt || exit 1

      - name: helm lint (with dev values)
        run: helm lint helm/ -f helm/values.dev.yaml

      - name: helm template (rendered yaml sanity)
        run: helm template orch helm/ -f helm/values.dev.yaml > /dev/null

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: orchestrator
          push: false
          tags: sisyphus-orchestrator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
