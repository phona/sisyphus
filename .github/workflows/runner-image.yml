name: runner-image

on:
  pull_request:
    paths:
      - 'runner/**'
      - 'scripts/check-scenario-refs.sh'
      - 'scripts/check-tasks-section-ownership.sh'
      - 'scripts/pre-commit-acl.sh'
      - '.github/workflows/runner-image.yml'
  push:
    branches: [main]
    tags: ['runner-v*']
    paths:
      - 'runner/**'
      - 'scripts/check-scenario-refs.sh'
      - 'scripts/check-tasks-section-ownership.sh'
      - 'scripts/pre-commit-acl.sh'
      - '.github/workflows/runner-image.yml'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: full     # Flutter + Go + 全工具链 (~5GB)
            dockerfile: runner/Dockerfile
            image_suffix: ''             # ghcr.io/<owner>/sisyphus-runner
            cache_scope: runner-full
          - flavor: go       # Go-only 轻量 (~1GB)，给 Go 项目（如 ubox-crosser）
            dockerfile: runner/go.Dockerfile
            image_suffix: '-go'          # ghcr.io/<owner>/sisyphus-runner-go
            cache_scope: runner-go
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/sisyphus-runner${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=match,pattern=runner-v(.*),group=1
            type=match,pattern=runner-v(\d+\.\d+),group=1
            type=match,pattern=runner-v(\d+),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/runner-v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (${{ matrix.flavor }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,scope=${{ matrix.cache_scope }},mode=max
