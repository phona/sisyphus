name: CI Flutter

on:
  push:
    branches: [master, main, release, v2.20.0-ai-rebuild]
  pull_request:
    branches: [master, main, release, v2.20.0-ai-rebuild]

jobs:
  ci:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      
      - name: CI Setup
        run: make ci-setup || true
      
      - name: Lint
        run: make ci-lint
      
      - name: Unit Test
        run: make ci-unit-test
      
      - name: Build
        run: make ci-build
