# Hoppscotch 本地测试配置

# 使用外部 PostgreSQL
postgresql:
  enabled: false

externalPostgresql:
  host: "postgres-shared"
  port: 5432
  database: "hoppscotch"
  user: "postgres"
  password: "devops"

# 认证配置（使用 Gitea OAuth）
auth:
  enabled: true
  providers:
    gitlab:
      enabled: false
    github:
      enabled: false
    google:
      enabled: false
    # 可以配置 Gitea 作为 OAuth 源
    # 注意：Hoppscotch 社区版不支持自定义 OAuth，需要企业版

# 服务配置
service:
  type: NodePort
  port: 3000
  nodePort: 30002

# Ingress 配置
ingress:
  enabled: false

# 资源限制
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# 环境变量
env:
  - name: DATABASE_URL
    value: "postgresql://postgres:devops@postgres-shared:5432/hoppscotch"
