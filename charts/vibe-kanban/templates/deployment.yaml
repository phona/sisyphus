apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibe-kanban.fullname" . }}
  labels:
    {{- include "vibe-kanban.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vibe-kanban.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vibe-kanban.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if .Values.gitea.enabled }}
        - name: setup-git-credentials
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              # 创建 .git-credentials
              mkdir -p /shared/.config/git
              GITEA_HOST=$(echo "$GITEA_URL" | sed 's|http://||; s|https://||')
              PROTOCOL=$(echo "$GITEA_URL" | grep -q "https" && echo "https" || echo "http")
              echo "${PROTOCOL}://${GITEA_USERNAME}:${GITEA_TOKEN}@${GITEA_HOST}" > /shared/.git-credentials
              
              # 配置 Git
              git config --global credential.helper store
              git config --global url."${PROTOCOL}://${GITEA_USERNAME}:${GITEA_TOKEN}@${GITEA_HOST}/".insteadOf "${GITEA_URL}/"
              
              cp /shared/.git-credentials /shared/
              cp /root/.gitconfig /shared/
              
              echo "Git credentials configured"
          env:
            - name: GITEA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.existingSecret | default "vibe-kanban-gitea" }}
                  key: token
            - name: GITEA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.existingSecret | default "vibe-kanban-gitea" }}
                  key: username
            - name: GITEA_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.existingSecret | default "vibe-kanban-gitea" }}
                  key: url
          volumeMounts:
            - name: git-credentials
              mountPath: /shared
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.command }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          {{- end }}
          {{- if .Values.args }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.env.PORT | default 3000 }}
              protocol: TCP
            - name: backend
              containerPort: {{ .Values.env.BACKEND_PORT | default 3001 }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "postgres://{{ .Values.database.external.username }}:{{ .Values.database.external.password }}@{{ .Values.database.external.host }}:{{ .Values.database.external.port }}/{{ .Values.database.external.database }}"
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.envFromSecrets }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if .Values.gitea.enabled }}
            - name: git-credentials
              mountPath: /root
            {{- end }}
            {{- if .Values.projects.enabled }}
            - name: projects
              mountPath: /projects
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: backend
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: backend
            initialDelaySeconds: 10
            periodSeconds: 5
        {{- if .Values.mcpProxy.enabled }}
        # MCP Proxy Sidecar - 将 stdio MCP 转为 SSE
        - name: mcp-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - sh
            - -c
            - |
              npm install -g mcp-proxy
              mcp-proxy npx vibe-kanban mcp --port 3002
          ports:
            - name: mcp
              containerPort: 3002
              protocol: TCP
          env:
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.claude.existingSecret | default "claude-api-key" }}
                  key: api-key
            - name: ANTHROPIC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.claude.existingSecret | default "claude-api-key" }}
                  key: anthropic-auth-token
            - name: ANTHROPIC_BASE_URL
              value: "https://open.bigmodel.cn/api/anthropic"
            - name: ANTHROPIC_DEFAULT_SONNET_MODEL
              value: "glm-5-turbo"
            - name: ANTHROPIC_DEFAULT_OPUS_MODEL
              value: "glm-5.1"
            - name: ANTHROPIC_DEFAULT_HAIKU_MODEL
              value: "glm-4.5-air"
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
        {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "vibe-kanban.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.gitea.enabled }}
        - name: git-credentials
          emptyDir: {}
        {{- end }}
        {{- if .Values.projects.enabled }}
        - name: projects
          persistentVolumeClaim:
            claimName: {{ include "vibe-kanban.fullname" . }}-projects
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
