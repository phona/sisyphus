apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibe-kanban.fullname" . }}
  labels:
    {{- include "vibe-kanban.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vibe-kanban.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vibe-kanban.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if .Values.gitea.enabled }}
        - name: setup-git-credentials
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              # 创建 .git-credentials
              mkdir -p /shared/.config/git
              GITEA_HOST=$(echo "$GITEA_URL" | sed 's|http://||; s|https://||')
              PROTOCOL=$(echo "$GITEA_URL" | grep -q "https" && echo "https" || echo "http")
              echo "${PROTOCOL}://${GITEA_USERNAME}:${GITEA_TOKEN}@${GITEA_HOST}" > /shared/.git-credentials
              
              # 配置 Git
              git config --global credential.helper store
              git config --global url."${PROTOCOL}://${GITEA_USERNAME}:${GITEA_TOKEN}@${GITEA_HOST}/".insteadOf "${GITEA_URL}/"
              
              cp /shared/.git-credentials /shared/
              cp /root/.gitconfig /shared/
              
              echo "Git credentials configured"
          env:
            - name: GITEA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.existingSecret | default "vibe-kanban-gitea" }}
                  key: token
            - name: GITEA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.existingSecret | default "vibe-kanban-gitea" }}
                  key: username
            - name: GITEA_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.existingSecret | default "vibe-kanban-gitea" }}
                  key: url
          volumeMounts:
            - name: git-credentials
              mountPath: /shared
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.command }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          {{- end }}
          {{- if .Values.args }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.env.PORT | default 3000 }}
              protocol: TCP
            - name: backend
              containerPort: {{ .Values.env.BACKEND_PORT | default 3001 }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "postgres://{{ .Values.database.external.username }}:{{ .Values.database.external.password }}@{{ .Values.database.external.host }}:{{ .Values.database.external.port }}/{{ .Values.database.external.database }}"
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFromSecrets }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            - name: worktrees
              mountPath: /var/tmp/vibe-kanban
            {{- if .Values.gitea.enabled }}
            - name: git-credentials
              mountPath: /root
            {{- end }}
            {{- if .Values.projects.enabled }}
            - name: projects
              mountPath: /projects
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: backend
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: backend
            initialDelaySeconds: 10
            periodSeconds: 5
        {{- if .Values.mcpProxy.enabled }}
        # MCP HTTP API - 直接调用 vibe-kanban API
        - name: mcp-http-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - sh
            - -c
            - |
              cat > /app/server.js << 'EOF'
              const express = require('express');
              const axios = require('axios');
              const app = express();
              app.use(express.json());
              const VK_API = 'http://localhost:3001';
              
              app.get('/health', (req, res) => res.json({status: 'ok'}));
              
              app.post('/api/design-contract', async (req, res) => {
                try {
                  const r = await axios.post(VK_API + '/api/workspaces', {
                    name: req.body.req_id || 'test',
                    prompt: req.body.description || req.body.title || ''
                  });
                  res.json({success: true, req_id: req.body.req_id, workspace_id: r.data.data?.id, branch: r.data.data?.branch});
                } catch (e) {
                  res.status(500).json({success: false, error: e.message});
                }
              });
              
              app.post('/api/create-openspecs', (req, res) => res.json({success: true, req_id: req.body.req_id}));
              app.post('/api/parallel-develop', (req, res) => res.json({success: true, req_id: req.body.req_id}));
              app.post('/api/tdd-battle', (req, res) => res.json({success: true, req_id: req.body.req_id}));
              app.post('/api/create-pr', (req, res) => res.json({success: true, req_id: req.body.req_id, pr_number: Math.floor(Math.random() * 100) + 1}));
              
              app.listen(3004, () => console.log('API on 3004'));
              EOF
              node /app/server.js
          ports:
            - name: http-proxy
              containerPort: 3004
              protocol: TCP
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
        {{- end }}
        {{- if .Values.wrapper.enabled }}
        # Claude Code HTTP Wrapper - 供 n8n 调用 claude -p
        - name: claude-wrapper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - sh
            - -c
            - |
              # 创建非 root 用户（Claude 拒绝以 root 运行）
              grep -q developer /etc/passwd || adduser -D -s /bin/sh developer
              mkdir -p /data /projects /home/developer 2>/dev/null
              chown -R developer:developer /data /projects /home/developer 2>/dev/null || true

              # 修复 git safe.directory 问题（PVC 文件属主为 root，但 Claude 以 developer 运行）
              git config --global --add safe.directory '*' 2>/dev/null || true
              # 为 developer 用户也配置
              su -s /bin/sh developer -c "git config --global --add safe.directory '*'" 2>/dev/null || true
              su -s /bin/sh developer -c "git config --global user.name 'Claude Bot'" 2>/dev/null || true
              su -s /bin/sh developer -c "git config --global user.email 'claude@sisyphus.local'" 2>/dev/null || true

              # 配置 Claude MCP 连接到 vibe-kanban
              mkdir -p /home/developer/.claude
              chown developer:developer /home/developer/.claude
              cat > /home/developer/.claude/mcp_settings.json << 'MCP_EOF'
              {
                "mcpServers": {
                  "vibe-kanban": {
                    "command": "vibe-kanban",
                    "args": ["mcp"],
                    "env": {
                      "PORT": "3000"
                    }
                  }
                }
              }
              MCP_EOF
              chown developer:developer /home/developer/.claude/mcp_settings.json

              # 确保 worktree 目录对 developer 可写
              chmod -R 777 /var/tmp/vibe-kanban 2>/dev/null || true

              cat > /app/wrapper.js << 'WRAPPER_EOF'
              const http = require('http');
              const { spawn } = require('child_process');
              const PORT = parseInt(process.env.WRAPPER_PORT || '3005');
              const DEFAULT_CWD = process.env.DEFAULT_CWD || '/projects/ttpos-server-go';
              const DEFAULT_TIMEOUT = parseInt(process.env.DEFAULT_TIMEOUT || '300000');

              function json(res, code, body) {
                res.writeHead(code, {'Content-Type':'application/json','Access-Control-Allow-Origin':'*'});
                res.end(JSON.stringify(body));
              }

              function runShell(commands, cwd, timeout) {
                return new Promise((resolve) => {
                  const script = commands.split('\n').filter(l => l.trim() && !l.trim().startsWith('#')).join(' && ');
                  const child = spawn('/bin/sh', ['-c', script], {
                    cwd,
                    env: {...process.env, HOME: '/home/developer', SHELL: '/bin/sh'},
                    stdio: ['ignore','pipe','pipe'],
                    detached: true,
                  });
                  let out = '', err = '', timedOut = false, responded = false;
                  const safeTimeout = Math.floor(timeout * 0.8);
                  const timer = setTimeout(() => { timedOut = true; try { process.kill(-child.pid, 'SIGTERM'); } catch(e){} setTimeout(()=>{ try { process.kill(-child.pid, 'SIGKILL'); } catch(e){} }, 3000); }, safeTimeout);
                  child.stdout.on('data', d => out += d.toString());
                  child.stderr.on('data', d => err += d.toString());
                  child.on('close', code => { clearTimeout(timer); if(!responded){responded=true; resolve({exitCode:code||0, output:out.trim(), stderr:err.trim(), timedOut});} });
                  child.on('error', e => { clearTimeout(timer); if(!responded){responded=true; resolve({exitCode:1, output:'', stderr:e.message, timedOut});} });
                });
              }

              function isShellPrompt(prompt) {
                return prompt.startsWith('Run these shell commands') || prompt.startsWith('执行:');
              }

              function extractCommands(prompt) {
                if (prompt.startsWith('Run these shell commands')) {
                  const lines = prompt.split('\n');
                  const cmdLines = [];
                  let started = false;
                  for (const line of lines) {
                    if (line.startsWith('Run these') || line.startsWith('do not modify:')) continue;
                    if (line.trim()) { started = true; cmdLines.push(line); }
                    else if (started) break;
                  }
                  return cmdLines.join('\n');
                }
                return prompt.replace(/^执行:\s*/, '').replace(/ 2>\/dev\/null/g, '').replace(/; /g, '\n');
              }

              function runClaude(prompt, cwd, timeout) {
                return new Promise((resolve, reject) => {
                  const fs = require('fs');
                  // Ensure worktrees are writable by developer before running Claude
                  try { require('child_process').execSync('chmod -R 777 /var/tmp/vibe-kanban/worktrees/ 2>/dev/null || true'); } catch(e){}
                  const tmpFile = '/tmp/claude-prompt-' + Date.now() + '.txt';
                  fs.writeFileSync(tmpFile, prompt);

                  const cmd = `/bin/busybox su -s /bin/sh developer -c "export SHELL=/bin/sh; export HOME=/home/developer; claude -p --dangerously-skip-permissions --mcp-config /home/developer/.claude/mcp_settings.json < ${tmpFile}"`;
                  const child = spawn('/bin/sh', ['-c', cmd], {
                    cwd,
                    env: {...process.env, SHELL: '/bin/sh', ANTHROPIC_API_KEY: process.env.ANTHROPIC_API_KEY||'', ANTHROPIC_MODEL: process.env.ANTHROPIC_MODEL||'claude-sonnet-4-6-20250514'},
                    stdio: ['ignore','pipe','pipe'],
                    detached: true,
                  });
                  let out = '', err = '', timedOut = false, responded = false;
                  // Use 80% of timeout to ensure we respond before n8n's HTTP timeout
                  const safeTimeout = Math.floor(timeout * 0.8);
                  const timer = setTimeout(() => { timedOut = true; try { process.kill(-child.pid, 'SIGTERM'); } catch(e){} setTimeout(()=>{ try { process.kill(-child.pid, 'SIGKILL'); } catch(e){} }, 3000); }, safeTimeout);
                  // Safety timeout: force respond after full timeout + 5s
                  const safetyTimer = setTimeout(() => {
                    if (!responded) { responded = true; try { process.kill(-child.pid, 'SIGKILL'); } catch(e){} try { fs.unlinkSync(tmpFile); } catch(e){}
                      resolve({exitCode:-1, output:out.trim(), stderr:err.trim()||'Force killed', timedOut:true}); }
                  }, parseInt(timeout) + 5000);
                  child.stdout.on('data', d => out += d.toString());
                  child.stderr.on('data', d => err += d.toString());
                  child.on('close', code => { clearTimeout(timer); clearTimeout(safetyTimer); if(!responded){responded=true; fs.unlink(tmpFile,()=>{}); resolve({exitCode:code, output:out.trim(), stderr:err.trim(), timedOut});} });
                  child.on('error', e => { clearTimeout(timer); clearTimeout(safetyTimer); if(!responded){responded=true; reject(e);} });
                });
              }

              http.createServer(async (req, res) => {
                res.setHeader('Access-Control-Allow-Origin','*');
                if (req.method==='OPTIONS') return res.end();
                if (req.method==='GET' && req.url==='/health') return json(res,200,{status:'ok'});
                if (req.method==='POST' && req.url==='/execute') {
                  let body='';
                  req.on('data', c => body+=c);
                  req.on('end', async () => {
                    try {
                      let parsed = JSON.parse(body);
                      // n8n HTTP Request node (keypair) sends {parameters: [{name, value}]}
                      if (parsed.parameters && Array.isArray(parsed.parameters)) {
                        const flat = {};
                        for (const param of parsed.parameters) {
                          if (param.name) flat[param.name] = param.value;
                        }
                        parsed = flat;
                      }
                      const {prompt, cwd, timeout} = parsed;
                      if (!prompt) return json(res,400,{error:'prompt is required'});
                      console.log('[wrapper] execute:', JSON.stringify({length:prompt.length, preview:prompt.substring(0,80)}));
                      let r;
                      if (isShellPrompt(prompt)) {
                        console.log('[wrapper] executing shell commands directly');
                        const commands = extractCommands(prompt);
                        r = await runShell(commands, cwd||DEFAULT_CWD, timeout||DEFAULT_TIMEOUT);
                      } else {
                        r = await runClaude(prompt, cwd||DEFAULT_CWD, timeout||DEFAULT_TIMEOUT);
                      }
                      console.log('[wrapper] done:', JSON.stringify({exitCode:r.exitCode, outLen:r.output.length, errLen:r.stderr.length}));
                      json(res, 200, r);
                    } catch(e) { json(res,500,{error:e.message}); }
                  });
                  return;
                }
                json(res, 404, {error:'Not Found'});
              }).listen(PORT, () => console.log(`[wrapper] listening on :${PORT}`));
              WRAPPER_EOF
              node /app/wrapper.js
          env:
            - name: WRAPPER_PORT
              value: "{{ .Values.wrapper.port | default 3005 }}"
            - name: DEFAULT_CWD
              value: {{ .Values.wrapper.defaultCwd | default "/projects/ttpos-server-go" | quote }}
            - name: DEFAULT_TIMEOUT
              value: "{{ .Values.wrapper.timeout | default 300000 }}"
            - name: ANTHROPIC_BASE_URL
              value: {{ .Values.wrapper.base_url | default "https://coding.dashscope.aliyuncs.com/apps/anthropic" | quote }}
            - name: ANTHROPIC_MODEL
              value: {{ .Values.wrapper.model | default "qwen3.6-plus" | quote }}
            - name: HTTP_PROXY
              value: "http://192.168.50.53:7890"
            - name: HTTPS_PROXY
              value: "http://192.168.50.53:7890"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.svc.cluster.local,gitea-http.sisyphus.svc.cluster.local,postgres-shared-postgresql.sisyphus.svc.cluster.local,vibe-kanban.sisyphus.svc.cluster.local,n8n.sisyphus.svc.cluster.local"
          envFrom:
            - secretRef:
                name: claude-api-key
          ports:
            - name: wrapper
              containerPort: {{ .Values.wrapper.port | default 3005 }}
              protocol: TCP
          resources:
            limits:
              cpu: {{ .Values.wrapper.resources.limits.cpu | default "1000m" }}
              memory: {{ .Values.wrapper.resources.limits.memory | default "1Gi" }}
            requests:
              cpu: {{ .Values.wrapper.resources.requests.cpu | default "100m" }}
              memory: {{ .Values.wrapper.resources.requests.memory | default "256Mi" }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            - name: worktrees
              mountPath: /var/tmp/vibe-kanban
            {{- if .Values.projects.enabled }}
            - name: projects
              mountPath: /projects
            {{- end }}
            {{- if .Values.gitea.enabled }}
            - name: git-credentials
              mountPath: /root
            {{- end }}
        {{- end }}
      volumes:
        - name: worktrees
          emptyDir: {}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "vibe-kanban.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.gitea.enabled }}
        - name: git-credentials
          emptyDir: {}
        {{- end }}
        {{- if .Values.projects.enabled }}
        - name: projects
          persistentVolumeClaim:
            claimName: {{ include "vibe-kanban.fullname" . }}-projects
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
