{{- if and .Values.projects.enabled .Values.projects.storage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vibe-kanban.fullname" . }}-projects
  labels:
    {{- include "vibe-kanban.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.projects.storage.storageClass }}
  storageClassName: {{ .Values.projects.storage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.projects.storage.size }}
{{- end }}
