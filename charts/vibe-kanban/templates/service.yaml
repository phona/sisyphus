apiVersion: v1
kind: Service
metadata:
  name: {{ include "vibe-kanban.fullname" . }}
  labels:
    {{- include "vibe-kanban.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.backendPort }}
      targetPort: backend
      protocol: TCP
      name: backend
    {{- if .Values.mcpProxy.enabled }}
    - port: {{ .Values.mcpProxy.port | default 3002 }}
      targetPort: mcp
      protocol: TCP
      name: mcp
    {{- end }}
  selector:
    {{- include "vibe-kanban.selectorLabels" . | nindent 4 }}
