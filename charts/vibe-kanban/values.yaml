# Default values for vibe-kanban.

image:
  repository: vibe-kanban
  pullPolicy: Never
  tag: "with-bash"

# 自定义启动命令（可选）
command: []
args: []

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Service configuration
service:
  type: ClusterIP
  # HTTP 端口 (vibe-kanban 同时提供前端和后端 API)
  port: 3001

# MCP Proxy Sidecar configuration
# 将 vibe-kanban 的 stdio MCP 转为 SSE，供 n8n 调用
mcpProxy:
  enabled: false
  port: 3004

# Claude Code HTTP Wrapper configuration
# n8n 调用此 wrapper 来执行 `claude -p` 任务
wrapper:
  enabled: true
  port: 3005
  defaultCwd: /projects/ttpos-server-go
  timeout: 300000
  base_url: "https://coding.dashscope.aliyuncs.com/apps/anthropic"
  model: "qwen3.6-plus"

# Claude API configuration
claude:
  # Secret name containing ANTHROPIC_API_KEY
  existingSecret: "claude-api-key"

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: vibe-kanban.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource configuration
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 256Mi

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Pod configuration
podAnnotations: {}
podSecurityContext: {}
securityContext: {}

# Node selector
nodeSelector: {}
tolerations: []
affinity: {}

# Database configuration
database:
  # Use external PostgreSQL (shared instance)
  external:
    enabled: true
    host: postgres-shared.sisyphus.svc.cluster.local
    port: 5432
    database: vibekanban
    username: postgres
    password: devops
  
  # Or use built-in SQLite (not recommended for production)
  sqlite:
    enabled: false

# Gitea integration
gitea:
  enabled: false
  url: "http://gitea-http.sisyphus.svc.cluster.local:3000"
  host: "gitea-http.sisyphus.svc.cluster.local:3000"
  username: "gitea_admin"
  # Name of existing secret containing token, username, url
  existingSecret: ""

# Projects configuration
projects:
  enabled: false
  storage:
    enabled: true
    size: 10Gi
    storageClass: ""
  repos: []
  # repos:
  #   - name: my-project
  #     url: http://gitea-http.sisyphus.svc.cluster.local:3000/gitea_admin/my-project.git
  #     branch: main

# Environment variables
env:
  # Server configuration
  # 前端 Vite dev server 端口
  PORT: "3001"
  # 后端 API 端口
  BACKEND_PORT: "3000"
  HOST: "0.0.0.0"
  MCP_HOST: "0.0.0.0"
  
  # CORS - Allow frontend origin  
  VK_ALLOWED_ORIGINS: "http://vibe-kanban.sisyphus.svc.cluster.local:3000,http://localhost:3000"
  
  # Disable analytics by default
  POSTHOG_API_KEY: ""
  POSTHOG_API_ENDPOINT: ""
  
  # Debug options
  DISABLE_WORKTREE_CLEANUP: "false"

# Additional environment variables from secrets
envFromSecrets: []

# Persistence
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /data

# Mount local projects directory
projectsMount:
  enabled: false
  hostPath: /path/to/projects
  mountPath: /projects
