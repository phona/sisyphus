# Thanatos helm chart values.
#
# driver toggles the deployment topology:
#   playwright | http  → single container Pod (thanatos)
#   adb                → two-container Pod (redroid sidecar + thanatos)
#
# Anything else fails `helm template` with a clear message.

driver: playwright

image:
  repository: ghcr.io/phona/thanatos
  # tag 必填且必须 immutable git-sha（issue #267）。
  # 部署时 helm upgrade --set image.tag=sha-<short> 注入；
  # mutable :dev / :latest 已禁止——节点缓存 + IfNotPresent 永远跑老镜像。
  tag: ""
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits: {}

service:
  # Debug only: kubectl port-forward + local mcp client. accept-agent reaches
  # the pod via `kubectl exec`, so service is not required for the happy path.
  type: ClusterIP
  port: 7000

# redroid sidecar settings (only used when driver=adb).
redroid:
  # 默认走 phona 自包装的 redroid-fixed（解 containerd 2.x runc1.4
  # `openat etc/passwd=*** escapes from parent` mount safety check —— 上游
  # `redroid/redroid:11.0.0-latest` / `:13.0.0_64only-latest` 都炸）。
  # build 流水：sisyphus repo `redroid-fixed/` + `.github/workflows/redroid-fixed-image.yml`。
  image: ghcr.io/phona/redroid-fixed:13.0.0
  # pullPolicy 跟 image.pullPolicy 解耦：thanatos 镜像走 immutable sha tag IfNotPresent；
  # redroid 走稳定 13.0.0 tag IfNotPresent 即可。空值则 fallback 到 image.pullPolicy。
  pullPolicy: ""
  port: 5555
  resources:
    requests:
      cpu: 500m
      memory: 1Gi

# Pod-level options
imagePullSecrets: []
nodeSelector: {}
tolerations: []
affinity: {}

# Extra env vars applied to the thanatos container.
extraEnv: []
