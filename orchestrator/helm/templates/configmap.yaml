apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "orchestrator.fullname" . }}
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
data:
  SISYPHUS_LOG_LEVEL: {{ .Values.env.log_level | quote }}
  SISYPHUS_LOG_JSON: {{ .Values.env.log_json | quote }}
  SISYPHUS_BKD_BASE_URL: {{ .Values.env.bkd_base_url | quote }}
  SISYPHUS_WORKDIR_ROOT: {{ .Values.env.workdir_root | quote }}
  SISYPHUS_SKIP_ANALYZE: {{ .Values.env.skip_analyze | quote }}
  SISYPHUS_SKIP_SPEC: {{ .Values.env.skip_spec | quote }}
  SISYPHUS_SKIP_DEV: {{ .Values.env.skip_dev | quote }}
  SISYPHUS_SKIP_CI_UNIT: {{ .Values.env.skip_ci_unit | quote }}
  SISYPHUS_SKIP_CI_INT: {{ .Values.env.skip_ci_int | quote }}
  SISYPHUS_SKIP_ACCEPT: {{ .Values.env.skip_accept | quote }}
  SISYPHUS_SKIP_REVIEWER: {{ .Values.env.skip_reviewer | quote }}
  SISYPHUS_SKIP_ARCHIVE: {{ .Values.env.skip_archive | quote }}
  SISYPHUS_TEST_MODE: {{ .Values.env.test_mode | quote }}
  {{- with .Values.env.snapshot_exclude_project_ids }}
  SISYPHUS_SNAPSHOT_EXCLUDE_PROJECT_IDS: {{ join "," . | quote }}
  {{- end }}
  {{- with .Values.env.default_involved_repos }}
  # JSON-encoded（不是 csv）—— pydantic-settings v2 对 list[str] 复合字段
  # 默认 JSON 解析；csv `phona/x,phona/y` 会触发 SettingsError 启动失败。
  SISYPHUS_DEFAULT_INVOLVED_REPOS: {{ toJson . | quote }}
  {{- end }}
