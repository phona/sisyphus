apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "orchestrator.fullname" . }}
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
data:
  SISYPHUS_LOG_LEVEL: {{ .Values.env.log_level | quote }}
  SISYPHUS_LOG_JSON: {{ .Values.env.log_json | quote }}
  SISYPHUS_BKD_BASE_URL: {{ .Values.env.bkd_base_url | quote }}
  SISYPHUS_WORKDIR_ROOT: {{ .Values.env.workdir_root | quote }}
  {{- with .Values.env.agent_model }}
  SISYPHUS_AGENT_MODEL: {{ . | quote }}
  {{- end }}
  SISYPHUS_SKIP_ANALYZE: {{ .Values.env.skip_analyze | quote }}
  SISYPHUS_SKIP_SPEC: {{ .Values.env.skip_spec | quote }}
  SISYPHUS_SKIP_DEV: {{ .Values.env.skip_dev | quote }}
  SISYPHUS_SKIP_CI_UNIT: {{ .Values.env.skip_ci_unit | quote }}
  SISYPHUS_SKIP_CI_INT: {{ .Values.env.skip_ci_int | quote }}
  SISYPHUS_SKIP_ACCEPT: {{ .Values.env.skip_accept | quote }}
  SISYPHUS_SKIP_REVIEWER: {{ .Values.env.skip_reviewer | quote }}
  SISYPHUS_SKIP_ARCHIVE: {{ .Values.env.skip_archive | quote }}
  SISYPHUS_TEST_MODE: {{ .Values.env.test_mode | quote }}
  {{- with .Values.env.snapshot_exclude_project_ids }}
  # JSON-encoded list[str]，跟 default_involved_repos / gh_incident_labels 同；
  # csv `proj-a,proj-b` 在 pydantic-settings v2 下解析 list[str] 会 SettingsError
  # 启动崩（issue #343 的实证 bug）。empty list 由外层 with 块跳过整个 key。
  SISYPHUS_SNAPSHOT_EXCLUDE_PROJECT_IDS: {{ toJson . | quote }}
  {{- end }}
  {{- with .Values.env.default_involved_repos }}
  # JSON-encoded（不是 csv）—— pydantic-settings v2 对 list[str] 复合字段
  # 默认 JSON 解析；csv `phona/x,phona/y` 会触发 SettingsError 启动失败。
  SISYPHUS_DEFAULT_INVOLVED_REPOS: {{ toJson . | quote }}
  {{- end }}
  {{- if .Values.env.gh_incident_repo }}
  SISYPHUS_GH_INCIDENT_REPO: {{ .Values.env.gh_incident_repo | quote }}
  {{- end }}
  {{- if .Values.env.default_base_branch }}
  SISYPHUS_DEFAULT_BASE_BRANCH: {{ .Values.env.default_base_branch | quote }}
  {{- end }}
  {{- if .Values.env.default_base_branches }}
  SISYPHUS_DEFAULT_BASE_BRANCHES: {{ toJson .Values.env.default_base_branches | quote }}
  {{- end }}
  {{- with .Values.env.gh_incident_labels }}
  # JSON-encoded list[str]，跟 default_involved_repos 同。
  SISYPHUS_GH_INCIDENT_LABELS: {{ toJson . | quote }}
  {{- end }}
  # ─── REQ-feat-stuck-notify-378-v2-1777866642：ESCALATED stale 主动通知 ────
  # 三元组：enabled (bool) / threshold_sec (int) / telegram_url (str)。
  # url 用 `if` 守门，空字符串不渲染 env 走 config.py default ""。
  {{- if hasKey .Values.env "escalated_stale_notify_enabled" }}
  SISYPHUS_ESCALATED_STALE_NOTIFY_ENABLED: {{ .Values.env.escalated_stale_notify_enabled | quote }}
  {{- end }}
  {{- if .Values.env.escalated_stale_threshold_sec }}
  SISYPHUS_ESCALATED_STALE_THRESHOLD_SEC: {{ .Values.env.escalated_stale_threshold_sec | quote }}
  {{- end }}
  {{- if .Values.env.escalated_stale_telegram_url }}
  SISYPHUS_ESCALATED_STALE_TELEGRAM_URL: {{ .Values.env.escalated_stale_telegram_url | quote }}
  {{- end }}
  # ─── REQ-feat-mcp-preflight-1777727213：pluggable prompt hook + MCP capability ─
  # 4 个字段都用 JSON-encoded（pydantic-settings v2 的 list/dict 复合字段默认走
  # JSON 解析）。values 留空时不渲染 env，走 orchestrator config.py 的 default_factory。
  {{- with .Values.env.enabled_prompt_hooks }}
  SISYPHUS_ENABLED_PROMPT_HOOKS: {{ toJson . | quote }}
  {{- end }}
  {{- with .Values.env.mcp_capability_providers }}
  SISYPHUS_MCP_CAPABILITY_PROVIDERS: {{ toJson . | quote }}
  {{- end }}
  {{- with .Values.env.mcp_capability_probe_tools }}
  SISYPHUS_MCP_CAPABILITY_PROBE_TOOLS: {{ toJson . | quote }}
  {{- end }}
  {{- with .Values.env.stage_mcp_requirements }}
  SISYPHUS_STAGE_MCP_REQUIREMENTS: {{ toJson . | quote }}
  {{- end }}
  {{- if .Values.prompts.configMap.enabled }}
  SISYPHUS_PROMPTS_DIR: /etc/sisyphus/prompts
  {{- end }}
