apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orchestrator.fullname" . }}
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "orchestrator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "orchestrator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
      annotations:
        # configmap/secret 改了自动滚动重启
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and .Values.secret.create (not .Values.existingSecret) }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "orchestrator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.migrations.enabled }}
      initContainers:
        - name: migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - sh
            - -c
            - |
              python -c "
              from orchestrator.migrate import apply_pending
              import os
              apply_pending(
                  os.environ['SISYPHUS_PG_DSN'],
                  lock_timeout=int(os.environ.get('SISYPHUS_MIGRATION_LOCK_TIMEOUT', '300'))
              )
              "
          envFrom:
            - configMapRef:
                name: {{ include "orchestrator.fullname" . }}
          env:
            {{- include "orchestrator.pgDsnEnv" . | nindent 12 }}
            - name: SISYPHUS_MIGRATION_LOCK_TIMEOUT
              value: {{ .Values.migrations.timeout | quote }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: orchestrator
          image: "{{ .Values.image.repository }}:{{ required "values.image.tag is required: must pin to immutable git-sha (e.g. sha-abc1234), see issue #267" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "orchestrator.fullname" . }}
          env:
            - name: SISYPHUS_BKD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "orchestrator.secretName" . }}
                  key: {{ if .Values.existingSecret }}{{ .Values.existingSecretKeys.bkd_token }}{{ else }}bkd_token{{ end }}
            - name: SISYPHUS_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "orchestrator.secretName" . }}
                  key: {{ if .Values.existingSecret }}{{ .Values.existingSecretKeys.webhook_token }}{{ else }}webhook_token{{ end }}
            {{- include "orchestrator.pgDsnEnv" . | nindent 12 }}
            {{- include "orchestrator.obsPgDsnEnv" . | nindent 12 }}
            # ── v0.2 K8s runner 配置（orchestrator 用 K8s client 管 per-REQ Pod） ──
            - name: SISYPHUS_RUNNER_NAMESPACE
              value: {{ .Values.runner.namespace | quote }}
            - name: SISYPHUS_RUNNER_IMAGE
              value: {{ required "values.runner.image is required: must pin to immutable git-sha (e.g. ghcr.io/phona/sisyphus-runner:sha-abc1234), see issue #267" .Values.runner.image | quote }}
            - name: SISYPHUS_RUNNER_SERVICE_ACCOUNT
              value: {{ .Values.runner.serviceAccountName | quote }}
            - name: SISYPHUS_RUNNER_STORAGE_CLASS
              value: {{ .Values.runner.storageClass | quote }}
            - name: SISYPHUS_RUNNER_WORKSPACE_SIZE
              value: {{ .Values.runner.workspaceSize | quote }}
            - name: SISYPHUS_RUNNER_SECRET_NAME
              value: {{ .Values.runner.secretName | quote }}
            - name: SISYPHUS_RUNNER_READY_TIMEOUT_SEC
              value: {{ .Values.runner.readyTimeoutSec | quote }}
            - name: SISYPHUS_PVC_RETAIN_ON_ESCALATE_DAYS
              value: {{ .Values.runner.retainOnEscalateDays | quote }}
            - name: SISYPHUS_RUNNER_GC_INTERVAL_SEC
              value: {{ .Values.runner.gcIntervalSec | quote }}
            - name: SISYPHUS_RUNNER_KVM_ENABLED
              value: {{ .Values.runner.kvmEnabled | default false | quote }}
            - name: SISYPHUS_K8S_IN_CLUSTER
              value: "true"
            # init-container 已跑 migration 时主容器跳过，避免重复竞争锁
            - name: SISYPHUS_SKIP_MIGRATION_ON_STARTUP
              value: {{ .Values.migrations.enabled | quote }}
            - name: SISYPHUS_MIGRATION_LOCK_TIMEOUT
              value: {{ .Values.migrations.timeout | quote }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
