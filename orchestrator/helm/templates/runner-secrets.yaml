{{- if and .Values.runner.createSecrets (not .Values.runner.existingSecretName) -}}
# 单一 runner secret，runner Pod 同时作为 env 源（gh/ghcr 凭证）和 volume 源
# （kubeconfig 文件）使用：
#   gh_token    → env GH_TOKEN
#   ghcr_user   → env SISYPHUS_GHCR_USER
#   ghcr_token  → env SISYPHUS_GHCR_TOKEN
#   kubeconfig  → volume mount /root/.kube/config
# 所有 key 都 optional；缺失只会影响对应功能。
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.runner.secretName }}
  namespace: {{ .Values.runner.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: sisyphus
type: Opaque
stringData:
  {{- if .Values.runner.secret.gh_token }}
  gh_token: {{ .Values.runner.secret.gh_token | quote }}
  {{- end }}
  {{- if .Values.runner.secret.ghcr_user }}
  ghcr_user: {{ .Values.runner.secret.ghcr_user | quote }}
  {{- end }}
  {{- if .Values.runner.secret.ghcr_token }}
  ghcr_token: {{ .Values.runner.secret.ghcr_token | quote }}
  {{- end }}
  {{- if .Values.runner.secret.kubeconfig }}
  kubeconfig: {{ .Values.runner.secret.kubeconfig | quote }}
  {{- end }}
{{- end -}}
