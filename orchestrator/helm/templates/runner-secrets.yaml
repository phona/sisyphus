{{- if and .Values.runner.createSecrets (not .Values.runner.existingSecretName) -}}
# runner Pod 通过 env 从这个 secret 读：
#   gh_token    → GH_TOKEN              （agent 用 gh CLI / git clone）
#   ghcr_user   → SISYPHUS_GHCR_USER    （docker login ghcr.io pull 镜像）
#   ghcr_token  → SISYPHUS_GHCR_TOKEN
# 都是 optional，runner Pod 起来不强依赖（没配跑不起 accept 是另一回事）。
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.runner.secretName }}
  namespace: {{ .Values.runner.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: sisyphus
type: Opaque
stringData:
  {{- if .Values.runner.secret.gh_token }}
  gh_token: {{ .Values.runner.secret.gh_token | quote }}
  {{- end }}
  {{- if .Values.runner.secret.ghcr_user }}
  ghcr_user: {{ .Values.runner.secret.ghcr_user | quote }}
  {{- end }}
  {{- if .Values.runner.secret.ghcr_token }}
  ghcr_token: {{ .Values.runner.secret.ghcr_token | quote }}
  {{- end }}
{{- end -}}
