{{- if and .Values.secret.create (not .Values.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "orchestrator.fullname" . }}
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.secret.bkd_token }}
  {{- fail "values.secret.bkd_token is required (BKD Coder-Session-Token)" }}
  {{- end }}
  {{- if not .Values.secret.webhook_token }}
  {{- fail "values.secret.webhook_token is required (X-Sisyphus-Token shared secret)" }}
  {{- end }}
  bkd_token: {{ .Values.secret.bkd_token | quote }}
  webhook_token: {{ .Values.secret.webhook_token | quote }}
  {{- if .Values.postgres.dsn }}
  pg_dsn: {{ .Values.postgres.dsn | quote }}
  {{- end }}
{{- end -}}
