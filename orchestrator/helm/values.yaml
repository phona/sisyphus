# sisyphus-orchestrator helm values
# 命名空间假设：sisyphus（PG 也在这里）
# install: helm -n sisyphus install orch ./helm -f my-values.yaml --create-namespace

replicaCount: 1   # 状态机靠 PG CAS 串行，多副本无害但 dedup 无意义

image:
  # GHCR：CI 推到 ghcr.io/<github-owner>/sisyphus-orchestrator
  # tag 推送规则见 .github/workflows/orchestrator-ci.yml
  repository: ghcr.io/phona/sisyphus-orchestrator
  tag: ""                     # 留空 → 用 Chart.appVersion；用 main 镜像填 "main"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true   # /opt/venv 是 root 目录，业务不写 fs

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: sisyphus.coder.tbc.5ok.co
      paths:
        - path: /bkd-events
          pathType: Prefix
        - path: /healthz
          pathType: Prefix
  tls: []
  # 生产建议:
  # tls:
  #   - hosts: [sisyphus.coder.tbc.5ok.co]
  #     secretName: sisyphus-tls

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# 跑 yoyo apply 用的初始化 init-container（同样的镜像）
migrations:
  enabled: true

# ─── 业务配置（注入 SISYPHUS_* env）──────────────────────────────────────
env:
  log_level: INFO
  log_json: true
  bkd_base_url: https://bkd-launcher--admin-jbcnet--weifashi.coder.tbc.5ok.co/api
  workdir_root: /var/sisyphus-ci
  # 不存任何 project_id / repo_url —— project_id 来自 webhook，
  # repo_url 来自 agent 自己 `git remote get-url origin`
  # snapshot loop 排除已知死项目（每 5min 一次的 BKD list_issues 失败 noise）。
  # 新增死项目走这里加 env，不动代码。
  snapshot_exclude_project_ids:
    - 77k9z58j
  # multi-layer involved_repos fallback 的 L4（env SISYPHUS_DEFAULT_INVOLVED_REPOS）。
  # 这个 chart 是 sisyphus self-deployment 专用 → ship 单仓 dogfood 默认。
  # 多仓 / 跨项目部署：在你的 my-values.yaml 里 override 成空 [] 或 ['phona/foo','phona/bar']。
  default_involved_repos:
    - phona/sisyphus
  # ─── Mock / 调试开关（生产全 false）─────────────────────────────
  # 任一 stage skip = create_<stage> 不调 BKD agent，直接 emit done/pass
  # test_mode: true = 全部 skip，秒级走完整 state 机
  skip_analyze: false
  skip_spec: false
  skip_dev: false
  skip_ci_unit: false
  skip_ci_int: false
  skip_accept: false       # ttpos-arch-lab 没接前可设 true
  skip_reviewer: false
  skip_archive: false
  test_mode: false

# ─── v0.2 runner（调试环境 Pod + PVC）─────────────────────────────────────
# 每个 REQ 一个 Pod（runner-<req>）+ 一个 PVC（workspace-<req>），住在独立
# namespace。Pod 是 privileged + DinD + fuse-overlayfs；PVC 挂 /workspace 做
# 持久化。生命周期绑 REQ，done/escalate 时销毁。
runner:
  namespace: sisyphus-runners
  createNamespace: true       # install 时自动创 ns（uninstall 不删 —— keep 注解）
  createRbac: true            # 自动建 Role/RoleBinding 给 orchestrator SA 管 ns
  serviceAccountName: sisyphus-runner-sa   # runner Pod 跑的 SA

  image: ghcr.io/phona/sisyphus-runner-go:main
  storageClass: local-path    # K3s 默认；多节点场景换 longhorn / NFS
  workspaceSize: 10Gi         # PVC 大小（runner 峰值 ~5GB + 余量）
  readyTimeoutSec: 120        # ensure_runner 等 Pod Ready 的超时
  retainOnEscalateDays: 7     # escalated REQ 的 PVC 保留天数，过期 GC 清
  gcIntervalSec: 3600         # orphan PVC/Pod 回收扫描周期

  imagePullSecrets: []        # 如果 runner image 私有需要填

  # 单一 runner secret：所有 runner Pod 要的凭证都在里面（keys 见下）
  #   gh_token    → env GH_TOKEN              **只供 runner 内 git clone 私有仓**
  #   ghcr_user   → env SISYPHUS_GHCR_USER    docker login ghcr.io
  #   ghcr_token  → env SISYPHUS_GHCR_TOKEN   （通常跟 gh_token 同一个只读 PAT）
  #   kubeconfig  → 挂载到 /root/.kube/config  accept 阶段 agent 起 helm 用
  #
  # ⚠️ 设计契约：**runner pod = 只读 checker**。所有 git push / gh pr create /
  #     gh pr merge 都在 BKD Coder workspace（"开发机"）里跑，用 Coder 自己注入
  #     的 gh auth，跟这里的 secret **完全无关**。runner 只 clone source、跑
  #     测试、跑 accept-env-up/down。如果未来需要在 runner 里写 GH 状态
  #     （如 PR review comment / status check），先回到本注释打回设计——默认拒绝。
  #
  # PAT 选型 + 4 步验证 playbook 见 docs/integration-contracts.md §1c
  # 速查（推荐度从高到低）：
  #   1. Fine-grained PAT (org 内生成) — Contents: Read-only + 限定具体仓。最干净
  #   2. Deploy Key (per-repo) + read:packages PAT —— 隔离干净，但配置繁琐
  #   3. Classic PAT —— 必勾 `repo` + `read:org` (+ `read:packages` 如需)
  #      classic 没有 read-only-repo scope，只能给 r+w；runner 不主动写但属过度授权
  #
  # ⚠️ patch secret 之前必跑 4 步 PAT 验证（curl /user 看 scopes / /user/orgs / /repos/x / git ls-remote）
  #     —— GitHub 私有仓 403 文案 "Write access not granted" 经常误导，跳过验证容易判错根因
  #     完整命令模板见 docs/integration-contracts.md §1c.2
  #
  # createSecrets=true 时 helm 帮建 secret（用下方 secret 段的值）；
  # 生产建议 createSecrets=false + existingSecretName 指向 SealedSecret / ESO 管的 secret
  createSecrets: true
  existingSecretName: ""
  secretName: sisyphus-runner-secrets
  secret:
    gh_token: ""              # !! 建议填：fine-grained PAT，**Contents: Read-only**（+ Packages: Read-only），限定 sisyphus 涉及的 repo
    ghcr_user: ""             # GHCR 用户名（通常是 GitHub 用户或 org 名）
    ghcr_token: ""            # GHCR PAT（read:packages 即可；可跟 gh_token 同一个）
    kubeconfig: ""            # kubeconfig 文件内容（accept 阶段 helm install 用）
                              # 生产建议单独放 --set-file runner.secret.kubeconfig=$HOME/.kube/config

# ─── 敏感信息 ─────────────────────────────────────────────────────────────
# 选 A：让 chart 自建 Secret（适合小规模 / dev）
secret:
  create: true
  bkd_token: ""           # !! 必填：BKD Coder-Session-Token
  webhook_token: ""       # !! 必填：BKD webhook 调用时带的 X-Sisyphus-Token

# 选 B：用外部已存在的 Secret（推荐 prod，配 SealedSecret / ESO）
existingSecret: ""        # 若设了，会覆盖 secret.create
existingSecretKeys:       # 外部 Secret 里 key 名映射
  bkd_token: bkd_token
  webhook_token: webhook_token
  pg_dsn: pg_dsn

# Postgres：用户已在同 ns 部署。默认假设用 Bitnami chart 装的 release 名 = sisyphus-postgresql
postgres:
  # 二选一：直接给完整 DSN，或拼 host/db/user，password 走 Secret
  dsn: ""   # 例：postgresql://sisyphus:pass@sisyphus-postgresql.sisyphus.svc:5432/sisyphus
  # 拼装方式（dsn 留空时生效）：
  host: sisyphus-postgresql.sisyphus.svc
  port: 5432
  database: sisyphus
  user: sisyphus
  passwordSecret:
    name: sisyphus-postgresql
    key: postgres-password

# 可观测性 DB（observability/schema.sql 的 sisyphus_obs；同实例不同 db）
# 留空 = 关掉 event_log 写入和 bkd_snapshot 同步
observability:
  enabled: true
  database: sisyphus_obs    # 用 postgres.user/passwordSecret 同账号连
  snapshotIntervalSec: 300  # 0 = 关掉 BKD snapshot 同步循环

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
