# sisyphus-orchestrator helm values
# 命名空间假设：sisyphus（PG 也在这里）
# install: helm -n sisyphus install orch ./helm -f my-values.yaml --create-namespace

replicaCount: 1   # 状态机靠 PG CAS 串行，多副本无害但 dedup 无意义

image:
  # GHCR：CI 推到 ghcr.io/<github-owner>/sisyphus-orchestrator
  # tag 推送规则见 .github/workflows/orchestrator-ci.yml
  repository: ghcr.io/phona/sisyphus-orchestrator
  tag: ""                     # 留空 → 用 Chart.appVersion；用 main 镜像填 "main"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true   # /opt/venv 是 root 目录，业务不写 fs

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: sisyphus.coder.tbc.5ok.co
      paths:
        - path: /bkd-events
          pathType: Prefix
        - path: /healthz
          pathType: Prefix
  tls: []
  # 生产建议:
  # tls:
  #   - hosts: [sisyphus.coder.tbc.5ok.co]
  #     secretName: sisyphus-tls

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# 跑 yoyo apply 用的初始化 init-container（同样的镜像）
migrations:
  enabled: true

# ─── 业务配置（注入 SISYPHUS_* env）──────────────────────────────────────
env:
  log_level: INFO
  log_json: true
  bkd_base_url: https://bkd-launcher--admin-jbcnet--weifashi.coder.tbc.5ok.co/api
  workdir_root: /var/sisyphus-ci
  # 不存任何 project_id / repo_url —— project_id 来自 webhook，
  # repo_url 来自 agent 自己 `git remote get-url origin`
  # ─── Mock / 调试开关（生产全 false）─────────────────────────────
  # 任一 stage skip = create_<stage> 不调 BKD agent，直接 emit done/pass
  # test_mode: true = 全部 skip，秒级走完整 state 机
  skip_analyze: false
  skip_spec: false
  skip_dev: false
  skip_ci_unit: false
  skip_ci_int: false
  skip_accept: false       # ttpos-arch-lab 没接前可设 true
  skip_reviewer: false
  skip_archive: false
  test_mode: false

# ─── v0.2 runner（调试环境 Pod + PVC）─────────────────────────────────────
# 每个 REQ 一个 Pod（runner-<req>）+ 一个 PVC（workspace-<req>），住在独立
# namespace。Pod 是 privileged + DinD + fuse-overlayfs；PVC 挂 /workspace 做
# 持久化。生命周期绑 REQ，done/escalate 时销毁。
runner:
  namespace: sisyphus-runners
  createNamespace: true       # install 时自动创 ns（uninstall 不删 —— keep 注解）
  createRbac: true            # 自动建 Role/RoleBinding 给 orchestrator SA 管 ns
  serviceAccountName: sisyphus-runner-sa   # runner Pod 跑的 SA

  image: ghcr.io/phona/sisyphus-runner-go:main
  storageClass: local-path    # K3s 默认；多节点场景换 longhorn / NFS
  workspaceSize: 10Gi         # PVC 大小（runner 峰值 ~5GB + 余量）
  readyTimeoutSec: 120        # ensure_runner 等 Pod Ready 的超时
  retainOnEscalateDays: 7     # escalated REQ 的 PVC 保留天数，过期 GC 清
  gcIntervalSec: 3600         # orphan PVC/Pod 回收扫描周期

  imagePullSecrets: []        # 如果 runner image 私有需要填

  # k8s 拉制品 + agent 工作用的凭证
  createSecrets: true         # 自建 runner secret；false 则用 existingSecretName
  existingSecretName: ""
  secretName: sisyphus-runner-secrets
  secret:
    gh_token: ""              # !! 建议填：GitHub PAT，scope=repo+read:packages
    ghcr_user: ""             # GHCR 用户名（通常是 GitHub 用户或 org 名）
    ghcr_token: ""            # GHCR PAT（可以跟 gh_token 同一个）

  # accept/staging 阶段 runner Pod 内 agent 要 `helm install` 到 accept-REQ-N
  # namespace，通过挂一个 kubeconfig secret 获得权限。这个 secret 不由 helm 建，
  # 部署方自己 kubectl create secret generic sisyphus-runner-kubeconfig ...
  kubeconfigSecretName: sisyphus-runner-kubeconfig

# ─── 敏感信息 ─────────────────────────────────────────────────────────────
# 选 A：让 chart 自建 Secret（适合小规模 / dev）
secret:
  create: true
  bkd_token: ""           # !! 必填：BKD Coder-Session-Token
  webhook_token: ""       # !! 必填：BKD webhook 调用时带的 X-Sisyphus-Token

# 选 B：用外部已存在的 Secret（推荐 prod，配 SealedSecret / ESO）
existingSecret: ""        # 若设了，会覆盖 secret.create
existingSecretKeys:       # 外部 Secret 里 key 名映射
  bkd_token: bkd_token
  webhook_token: webhook_token
  pg_dsn: pg_dsn

# Postgres：用户已在同 ns 部署。默认假设用 Bitnami chart 装的 release 名 = sisyphus-postgresql
postgres:
  # 二选一：直接给完整 DSN，或拼 host/db/user，password 走 Secret
  dsn: ""   # 例：postgresql://sisyphus:pass@sisyphus-postgresql.sisyphus.svc:5432/sisyphus
  # 拼装方式（dsn 留空时生效）：
  host: sisyphus-postgresql.sisyphus.svc
  port: 5432
  database: sisyphus
  user: sisyphus
  passwordSecret:
    name: sisyphus-postgresql
    key: postgres-password

# 可观测性 DB（observability/schema.sql 的 sisyphus_obs；同实例不同 db）
# 留空 = 关掉 event_log 写入和 bkd_snapshot 同步
observability:
  enabled: true
  database: sisyphus_obs    # 用 postgres.user/passwordSecret 同账号连
  snapshotIntervalSec: 300  # 0 = 关掉 BKD snapshot 同步循环

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
