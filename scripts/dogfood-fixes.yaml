# Dogfood fixes: sisyphus 部署阻塞点修复（P0/P1）
# Usage: python3 sisyphus/scripts/bkd-cli.py yaml sisyphus/scripts/dogfood-fixes.yaml --trigger

project: nnvxh8wj
base_url: http://localhost:3000/api

issues:
  - title: "【修复-1】intake agent 不 PATCH result tag 导致 pipeline 卡住"
    description: |
      所有 intent:intake 的 REQ 在 intake 阶段完成后都卡住。
      root cause: intake.md.j2 虽然写了要 PATCH result:pass，但 agent 没执行。
      orchestrator 的 router.derive_event 对 intake session.completed 要求 tags 里有 result:pass/fail，否则返回 None → webhook.no_event_mapping → mark_processed → dedup skip。

      修复方向（二选一或都做）：
      1. intake.md.j2 加强制 tool call：session 结束前必须用 Bash curl PATCH result:pass，不写不能 move review。
      2. orchestrator 改兜底逻辑：session.completed + intake tag + 无 result 时，主动 GET issue description 解析 finalized intent JSON，不依赖 result tag。
    priority: p0
    tags: ["dogfood", "intake", "result-tag", "pipeline-blocker"]
    trigger: true
    intent: execute

  - title: "【修复-2】intent issue webhook 丢失导致 start_intake 不运行"
    description: |
      qn8ce7lw (gap-2 thanatos cleanup) 的 orchestrator 日志中没有 INTENT_INTAKE 事件，
      start_intake 从未运行，agent 直接跑完了 intent issue 本身。

      可能原因：
      1. BKD 发 webhook 时网络抖动丢失
      2. orchestrator 的 webhook handler 在处理其他事件时 crash，导致 webhook 未 ACK
      3. BKD 的 webhook 配置有问题（如 endpoint 错误、超时过短）

      修复方向：
      1. 检查 BKD webhook 配置和投递日志
      2. 给 orchestrator 加 orphan intent issue 扫描增强（snapshot loop 已扫 intent:execute，但 intent:intake 可能漏了）
      3. 考虑在 bkd-cli.py 派单后主动 poll 确认 webhook 被处理，或加一个 admin trigger 接口
    priority: p0
    tags: ["dogfood", "webhook", "intent-intake", "pipeline-blocker"]
    trigger: true
    intent: execute

  - title: "【修复-3】webhook dedup 过度 mark_processed 导致合法事件丢失"
    description: |
      webhook.py 中多个早期 return 点（skip_no_req_tag / no_event_mapping / skip_no_req_or_intent_tag）
      都会 await dedup.mark_processed(pool, eid)。

      后果：
      1. 第一次 webhook 到达时被错误标记为已处理
      2. BKD 重发时 dedup 返回 skip
      3. 合法事件永远丢失

      修复方向：
      1. 早期 return（no_event_mapping / skip_no_req_tag）不要 mark_processed，
         让 BKD 重发时走 retry 路径。
      2. 或者 mark_processed 只在 handler 成功执行 engine.step transition 后才调。
      3. 或者给 event_seen 表加一列 handler_result，早期 return 记为 soft-processed，
         允许 N 分钟后重试。
    priority: p1
    tags: ["dogfood", "webhook", "dedup", "event-loss"]
    trigger: true
    intent: execute

  - title: "【修复-4】openspec changes 归档 + 残留清理"
    description: |
      openspec/changes/ 下有 73 个 REQ-xxx 目录，仅 3 个 capability 进了 specs/。
      done-archive 阶段的 openspec apply 基本没跑成功过。

      处理方案：
      1. 对已合入 main 的 REQ，手动跑 openspec apply 归档到 specs/ 和 project.md
      2. 对 ESCALATED / DESCOPED 的 REQ（如 thanatos 系列），直接删除 changes/ 残留
      3. 检查 done-archive agent 的 prompt，确认 openspec apply 命令正确
      4. 归档完成后批量 git rm -rf 废弃的 changes/ 目录，提 PR 清理
    priority: p1
    tags: ["dogfood", "openspec", "archive", "cleanup"]
    trigger: true
    intent: execute
