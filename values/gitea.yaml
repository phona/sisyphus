# Gitea Helm values - 禁用所有内置依赖

# 禁用内置 PostgreSQL
postgresql:
  enabled: false

# 禁用 PostgreSQL HA
postgresql-ha:
  enabled: false

# 禁用 Valkey Cluster
valkey-cluster:
  enabled: false

# 禁用 Valkey
valkey:
  enabled: false

persistence:
  enabled: true
  size: 5Gi

# 使用外部 PostgreSQL
gitea:
  admin:
    existingSecret: gitea-admin-secret
  config:
    database:
      DB_TYPE: postgres
      HOST: postgres-shared-postgresql:5432
      NAME: gitea
      USER: postgres
      PASSWD: devops
    server:
      ROOT_URL: "http://gitea-http.sisyphus.svc.cluster.local:3000/"
    actions:
      ENABLED: true
    webhook:
      ALLOWED_HOST_LIST: "*"

service:
  http:
    type: ClusterIP
    port: 3000

image:
  pullPolicy: IfNotPresent
