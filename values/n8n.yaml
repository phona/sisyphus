# n8n Helm Chart Values
# 使用外部 PostgreSQL 数据库，禁用内置依赖

# 镜像配置
image:
  repository: n8nio/n8n
  tag: "latest"
  pullPolicy: IfNotPresent

# 禁用内置 PostgreSQL
postgresql:
  enabled: false

# 禁用内置 Redis (我们不使用 queue 模式)
redis:
  enabled: false

# 使用外部 PostgreSQL
db:
  type: postgresdb
  postgresdb:
    poolSize: 5
    connectionTimeout: 20000

externalPostgresql:
  host: postgres-shared-postgresql.sisyphus.svc.cluster.local
  port: 5432
  username: postgres
  password: devops
  database: n8n
  # 如果要使用已有的 secret，取消下面注释并提供 secret 名称
  # existingSecret: n8n-postgres-secret

# 主节点配置
main:
  # 启用持久化
  persistence:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce

  # 额外环境变量 - chart 要求 table/map 格式
  extraEnvVars:
    N8N_BASIC_AUTH_ACTIVE: "true"
    N8N_BASIC_AUTH_USER: "admin"
    N8N_BASIC_AUTH_PASSWORD: "admin123"
    WEBHOOK_URL: "http://localhost:5678/"
    OPENAI_API_KEY: "sk-lqavbdvmpcteoecjnplmuehaqoweujhozvkziotwzsbdx"
    OPENAI_BASE_URL: "https://api.siliconflow.cn/v1"
    OPENAI_MODEL: "Pro/deepseek-ai/DeepSeek-V3.2"
    N8N_SECURE_COOKIE: "false"
    # 确保 task runner 能找到 shell
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    # 延长工作流执行超时（MCP 流程可能超过 10 分钟）
    EXECUTIONS_TIMEOUT: "3600"
    EXECUTIONS_TIMEOUT_MAX: "3600"
    # 延长 task runner 请求超时（code 节点默认 60s 太短，AI 代码生成可能需要 20+ 分钟）
    N8N_RUNNERS_TASK_REQUEST_TIMEOUT: "1800"
    # 代理配置
    HTTP_PROXY: "http://192.168.50.53:7890"
    HTTPS_PROXY: "http://192.168.50.53:7890"
    NO_PROXY: "localhost,127.0.0.1,.svc.cluster.local,gitea-http.sisyphus.svc.cluster.local,postgres-shared-postgresql.sisyphus.svc.cluster.local,vibe-kanban.sisyphus.svc.cluster.local,n8n.sisyphus.svc.cluster.local"

  # 资源限制（长执行需要更多资源）
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  # 延长 probe，避免 kind 资源紧张时超时重启
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    httpGet:
      path: /healthz/readiness
      port: http
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 6

# taskRunners 配置：n8n:latest (2.16.0) 不包含 task-runner-launcher，必须使用 internal
taskRunners:
  mode: internal
  taskTimeout: 300
  maxConcurrency: 3

# 服务模式（使用 ClusterIP，通过 telepresence 访问）
service:
  type: ClusterIP
  port: 5678

# 禁用 ingress（我们使用 telepresence）
ingress:
  enabled: false

# 日志配置
log:
  level: info
  output:
    - console

# 安全上下文
podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: false
