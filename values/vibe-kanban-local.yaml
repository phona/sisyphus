# Vibe Kanban 本地构建版本配置

image:
  repository: vibe-kanban
  tag: claude-test
  pullPolicy: IfNotPresent

# 使用镜像内置的 CMD，不覆盖
command: []
args: []

service:
  type: ClusterIP
  port: 3001
  backendPort: 3000

# 使用共享 PostgreSQL
database:
  external:
    enabled: true
    host: postgres-shared-postgresql.sisyphus.svc.cluster.local
    port: 5432
    database: vibekanban
    username: postgres
    password: devops

# Gitea 集成配置
gitea:
  enabled: true
  url: "http://gitea-http.sisyphus.svc.cluster.local:3000"
  host: "gitea-http.sisyphus.svc.cluster.local:3000"
  username: "gitea_admin"
  # Token secret 由 deploy 脚本创建

# 项目列表 - 部署时自动 clone
projects:
  enabled: true
  storage:
    enabled: true
    size: 10Gi
  repos:
    - name: ttpos-flutter
      url: http://gitea-http.sisyphus.svc.cluster.local:3000/gitea_admin/ttpos-flutter.git
      branch: master
    - name: ttpos-server-go
      url: http://gitea-http.sisyphus.svc.cluster.local:3000/gitea_admin/ttpos-server-go.git
      branch: master

# 环境变量配置
env:
  PORT: "3001"
  BACKEND_PORT: "3000"
  HOST: "0.0.0.0"
  MCP_HOST: "0.0.0.0"
  
  # CORS 配置
  VK_ALLOWED_ORIGINS: "http://vibe-kanban.sisyphus.svc.cluster.local:3001,http://localhost:3001,http://127.0.0.1:3001"
  
  # 禁用分析
  POSTHOG_API_KEY: ""
  POSTHOG_API_ENDPOINT: ""

# 资源限制
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# 持久化
persistence:
  enabled: true
  size: 5Gi
  accessMode: ReadWriteOnce
  mountPath: /data
