# Vibe Kanban 本地构建版本配置

image:
  repository: vibe-kanban
  tag: local
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  backendPort: 3001

# 使用共享 PostgreSQL
database:
  external:
    enabled: true
    host: postgres-shared-postgresql.sisyphus.svc.cluster.local
    port: 5432
    database: vibekanban
    username: postgres
    password: devops

# 环境变量配置
env:
  PORT: "3000"
  BACKEND_PORT: "3001"
  HOST: "0.0.0.0"
  MCP_HOST: "0.0.0.0"
  
  # CORS 配置
  VK_ALLOWED_ORIGINS: "http://vibe-kanban.sisyphus.svc.cluster.local:3000,http://localhost:3000,http://127.0.0.1:3000"
  
  # 禁用分析
  POSTHOG_API_KEY: ""
  POSTHOG_API_ENDPOINT: ""

# 资源限制
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

# 持久化
persistence:
  enabled: true
  size: 5Gi
  accessMode: ReadWriteOnce
